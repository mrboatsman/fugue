name: Build and publish Docker image

on:
  push:
    branches: [main]
  # Trigger when Release workflow completes (after it creates a tag)
  workflow_run:
    workflows: ["Release"]
    types: [completed]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    # Run on push to main (dev tag), or when Release workflow succeeded (release tags)
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine if this is a release build
        id: build_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            # Only treat as release if release-plz actually created a version tag on HEAD
            TAG=$(git tag --points-at HEAD | grep '^v' | head -1)
            if [ -n "$TAG" ]; then
              VERSION="${TAG#v}"
              echo "is_release=true" >> "$GITHUB_OUTPUT"
              echo "version=$VERSION" >> "$GITHUB_OUTPUT"
              echo "Release tag found: $TAG (version $VERSION)"
            else
              echo "is_release=false" >> "$GITHUB_OUTPUT"
              echo "No release tag on HEAD — skipping release build"
            fi
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "Triggered by push — dev only"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev
            type=raw,value=${{ steps.build_type.outputs.version }},enable=${{ steps.build_type.outputs.is_release == 'true' }}
            type=raw,value=latest,enable=${{ steps.build_type.outputs.is_release == 'true' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
