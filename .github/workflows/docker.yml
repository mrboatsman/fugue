name: Build and publish Docker image

on:
  push:
    branches: [main]
  # Trigger when Release workflow completes (after it creates a tag)
  workflow_run:
    workflows: ["Release"]
    types: [completed]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    # Only run if triggered by push to main, or if Release workflow succeeded
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine if this is a release build
        id: build_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "Triggered by Release workflow — will tag as release"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "Triggered by push — dev only"
          fi

      - name: Extract version from Cargo.toml
        if: steps.build_type.outputs.is_release == 'true'
        id: cargo_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Cargo version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev
            type=raw,value=${{ steps.cargo_version.outputs.version }},enable=${{ steps.build_type.outputs.is_release == 'true' }}
            type=raw,value=latest,enable=${{ steps.build_type.outputs.is_release == 'true' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
