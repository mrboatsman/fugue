name: Build and publish Docker image

on:
  push:
    branches: [main]
  # Trigger when Release workflow completes (after it creates a tag)
  workflow_run:
    workflows: ["Release"]
    types: [completed]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    # Only run if triggered by push to main, or if Release workflow succeeded
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Extract version from Cargo.toml
        id: cargo_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Cargo version: $VERSION"

      - name: Check if version tag exists
        id: check_tag
        run: |
          git fetch --tags --force
          VERSION="${{ steps.cargo_version.outputs.version }}"
          echo "Looking for tag v${VERSION}..."
          git tag -l
          if git tag -l "v${VERSION}" | grep -q "v${VERSION}"; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${VERSION} found — will tag as release"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag v${VERSION} not found — dev only"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev
            type=raw,value=${{ steps.cargo_version.outputs.version }},enable=${{ steps.check_tag.outputs.is_release == 'true' }}
            type=raw,value=latest,enable=${{ steps.check_tag.outputs.is_release == 'true' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
